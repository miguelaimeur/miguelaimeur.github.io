<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apuro Reel TV · Estación Web Oficial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    /* VARIABLES Y RESET */
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0d;--panel:#12121a;--panel-2:#171723;--line:#242436;--text:#ececf3;--muted:#8a8aa0;--accent:#f4df43;--accent-2:#ff5d5d;--font-head:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace}
    
    body{background:radial-gradient(circle at top,rgba(244,223,67,.11),transparent 32%),linear-gradient(180deg,#0b0b10 0%,#09090c 100%);color:var(--text);font-family:var(--font-body); min-height: 100vh; overflow-x: hidden; display: flex; align-items: center; justify-content: center;}
    
    /* CONTENEDOR PRINCIPAL */
    .shell{width:min(1380px,calc(100% - 32px)); margin: 20px auto; border:1px solid var(--line);background:rgba(9,9,14,.88);box-shadow:0 30px 80px rgba(0,0,0,.45);backdrop-filter:blur(12px);position: relative; z-index: 1;}
    
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 24px;border-bottom:1px solid var(--line)}
    .logo-wrap{display:flex;align-items:end;gap:12px}.logo{font-family:var(--font-head);font-size:2.4rem;letter-spacing:.08em;line-height:.9}.logo em{font-style:normal;color:var(--accent)}
    .badge{background:var(--accent-2);color:#fff;padding:4px 10px;border-radius:3px;font-family:var(--font-mono);font-size:.68rem;letter-spacing:.14em}
    .clock{font-family:var(--font-mono);font-size:1.2rem;color:var(--accent);letter-spacing:.08em; text-align: right;}
    .date{color:var(--muted);font-family:var(--font-mono);font-size:.62rem;letter-spacing:.18em;margin-top:4px; text-align: right;}

    /* REDES SOCIALES */
    .social-row{display:flex;gap:8px;padding:12px 24px;border-bottom:1px solid var(--line);overflow-x:auto;background:rgba(255,255,255,.02);scrollbar-width: none;}
    .social-row::-webkit-scrollbar {display: none;}
    .social-link{color:var(--text);text-decoration:none;border:1px solid var(--line);background:var(--panel);padding:8px 16px;border-radius:999px;font-family:var(--font-mono);font-size:.72rem;white-space:nowrap;transition:.2s ease; display: flex; align-items: center; gap: 6px;}
    .social-link:hover{border-color:var(--accent);color:var(--accent);background: rgba(244,223,67,0.05);}

    /* LAYOUT */
    .layout{display:grid;grid-template-columns:minmax(0,1.2fr) 320px;min-height:720px}
    .left{border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0}
    .status-bar{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--panel)}
    .dot{width:9px;height:9px;border-radius:50%;background:var(--accent-2);box-shadow:0 0 12px rgba(255,93,93,.6)}
    .status-label{color:var(--accent-2);font-family:var(--font-mono);font-size:.72rem;letter-spacing:.16em}
    .status-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.85rem; font-weight: 500;}

    /* REPRODUCTOR */
    .screen-area{flex:1;display:grid;place-items:center;padding:28px;background:#08080c}
    .tv{width:100%; max-width: 900px;}
    .frame{position:relative;aspect-ratio:16/9;border-radius:24px;border:1px solid #2a2a38;background:#000;padding:12px;box-shadow:0 24px 70px rgba(0,0,0,.62)}
    .screen{position:relative;width:100%;height:100%;overflow:hidden;border-radius:14px;}
    #player-v1{width:100%;height:100%;}
    
    .overlay-loading{position:absolute;inset:0;display:grid;place-items:center;background:#0a0a0d;z-index:10;font-family:var(--font-mono); text-align: center;}
    
    .controls{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--line);background:var(--panel)}
    .btn{appearance:none;border:1px solid var(--line);background:var(--panel-2);color:var(--text);border-radius:999px;padding:10px 16px;font-family:var(--font-mono);font-size:.72
