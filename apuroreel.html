<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apuro Reel TV Â· EstaciÃ³n Web Oficial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    /* VARIABLES Y RESET */
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0d;--panel:#12121a;--panel-2:#171723;--line:#242436;--text:#ececf3;--muted:#8a8aa0;--accent:#f4df43;--accent-2:#ff5d5d;--font-head:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace}
    
    body{background:radial-gradient(circle at top,rgba(244,223,67,.11),transparent 32%),linear-gradient(180deg,#0b0b10 0%,#09090c 100%);color:var(--text);font-family:var(--font-body); min-height: 100vh; overflow-x: hidden; display: flex; align-items: center; justify-content: center;}
    
    /* CONTENEDOR PRINCIPAL */
    .shell{width:min(1380px,calc(100% - 32px)); margin: 20px auto; border:1px solid var(--line);background:rgba(9,9,14,.88);box-shadow:0 30px 80px rgba(0,0,0,.45);backdrop-filter:blur(12px);position: relative; z-index: 1;}
    
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 24px;border-bottom:1px solid var(--line)}
    .logo-wrap{display:flex;align-items:end;gap:12px}.logo{font-family:var(--font-head);font-size:2.4rem;letter-spacing:.08em;line-height:.9}.logo em{font-style:normal;color:var(--accent)}
    .badge{background:var(--accent-2);color:#fff;padding:4px 10px;border-radius:3px;font-family:var(--font-mono);font-size:.68rem;letter-spacing:.14em}
    .clock{font-family:var(--font-mono);font-size:1.2rem;color:var(--accent);letter-spacing:.08em; text-align: right;}
    .date{color:var(--muted);font-family:var(--font-mono);font-size:.62rem;letter-spacing:.18em;margin-top:4px; text-align: right;}

    /* REDES SOCIALES */
    .social-row{display:flex;gap:8px;padding:12px 24px;border-bottom:1px solid var(--line);overflow-x:auto;background:rgba(255,255,255,.02);scrollbar-width: none;}
    .social-row::-webkit-scrollbar {display: none;}
    .social-link{color:var(--text);text-decoration:none;border:1px solid var(--line);background:var(--panel);padding:8px 16px;border-radius:999px;font-family:var(--font-mono);font-size:.72rem;white-space:nowrap;transition:.2s ease; display: flex; align-items: center; gap: 6px;}
    .social-link:hover{border-color:var(--accent);color:var(--accent);background: rgba(244,223,67,0.05);}

    /* LAYOUT */
    .layout{display:grid;grid-template-columns:minmax(0,1.2fr) 320px;min-height:720px}
    .left{border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0}
    .status-bar{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--panel)}
    .dot{width:9px;height:9px;border-radius:50%;background:var(--accent-2);box-shadow:0 0 12px rgba(255,93,93,.6)}
    .status-label{color:var(--accent-2);font-family:var(--font-mono);font-size:.72rem;letter-spacing:.16em}
    .status-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.85rem; font-weight: 500;}

    /* REPRODUCTOR */
    .screen-area{flex:1;display:grid;place-items:center;padding:28px;background:#08080c}
    .tv{width:100%; max-width: 900px;}
    .frame{position:relative;aspect-ratio:16/9;border-radius:24px;border:1px solid #2a2a38;background:#000;padding:12px;box-shadow:0 24px 70px rgba(0,0,0,.62)}
    .screen{position:relative;width:100%;height:100%;overflow:hidden;border-radius:14px;}
    #player-v1{width:100%;height:100%;}
    
    .overlay-loading{position:absolute;inset:0;display:grid;place-items:center;background:#0a0a0d;z-index:10;font-family:var(--font-mono); text-align: center;}
    
    .controls{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--line);background:var(--panel)}
    .btn{appearance:none;border:1px solid var(--line);background:var(--panel-2);color:var(--text);border-radius:999px;padding:10px 16px;font-family:var(--font-mono);font-size:.72rem;cursor:pointer; transition: 0.2s;}
    .btn:hover{border-color: var(--accent); color: var(--accent);}
    .btn-primary{background:var(--accent);color:#000;font-weight:bold;border:none}

    .progress{padding:14px 18px;border-top:1px solid var(--line);background:rgba(255,255,255,.02)}
    .bar{height:4px;border-radius:999px;background:#262638;margin:10px 0;overflow:hidden}
    .bar div{height:100%;background:var(--accent);width:0%; transition: width 1s linear;}

    /* SIDEBAR / PARRILLA */
    .sidebar{display:flex;flex-direction:column; background: #0c0c12;}
    .panel{padding:18px;border-bottom:1px solid var(--line)}
    .panel h2{font-family: var(--font-head); font-size: 1.4rem; letter-spacing: 1px;}
    .guide-list{flex:1;overflow-y:auto;max-height:700px; scrollbar-width: thin; scrollbar-color: var(--line) transparent;}
    .guide-item{width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);padding:14px 18px;color:var(--text);cursor:pointer; transition: 0.2s;}
    .guide-item:hover{background: rgba(255,255,255,0.03);}
    .guide-item.live{background: rgba(244,223,67,0.08); border-left: 4px solid var(--accent);}
    .guide-item small{font-family: var(--font-mono); color: var(--muted); font-size: 0.65rem;}
    .guide-item.live small{color: var(--accent);}
    .guide-item strong{display: block; margin-top: 4px; font-size: 0.85rem; line-height: 1.2;}

    @media (max-width: 900px) {
        .layout{grid-template-columns: 1fr;}
        .sidebar{border-top: 1px solid var(--line);}
    }
</style>
</head>
<body>

<div class="shell">
    <header>
        <div class="logo-wrap"><div class="logo">APURO <em>REEL</em> TV</div><div class="badge">EN DIRECTO</div></div>
        <div class="top-right">
            <div class="clock" id="clock-v1">00:00:00</div>
            <div class="date" id="date-v1">CARGANDO...</div>
        </div>
    </header>

    <div class="social-row" id="socials-v1"></div>

    <main class="layout">
        <section class="left">
            <div class="status-bar">
                <div class="dot"></div>
                <div class="status-label">ON AIR</div>
                <div class="status-title" id="title-v1">Sincronizando...</div>
            </div>
            <div class="screen-area">
                <div class="tv">
                    <div class="frame">
                        <div class="screen">
                            <div class="overlay-loading" id="loading-v1">
                                <h2>CARGANDO CONTENIDO...</h2>
                            </div>
                            <div id="player-v1"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="controls">
                <button class="btn btn-primary" id="go-live-v1">VOLVER AL DIRECTO</button>
                <button class="btn" id="mute-v1">QUITAR SILENCIO</button>
            </div>
            <div class="progress">
                <div id="countdown-v1" style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 1px;">SIGUIENTE EP EN: 00:00</div>
                <div class="bar"><div id="bar-v1"></div></div>
            </div>
        </section>

        <aside class="sidebar">
            <div class="panel"><h2>PROGRAMACIÃ“N</h2></div>
            <div class="guide-list" id="guide-v1"></div>
        </aside>
    </main>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const CONFIG = {
    playlistId: "PLktEpakcg6naC1oocHyJL3XtaZzegYnG0",
    timezone: "Europe/Madrid",
    socials: [
        {label:"YouTube", url:"https://youtube.com/@apuroreel"},
        {label:"Kick", url:"https://kick.com/apuroreel"},
        {label:"Twitch", url:"https://www.twitch.tv/apuroreel"},
        {label:"Instagram", url:"https://instagram.com/apuroreel"},
        {label:"TikTok", url:"https://tiktok.com/@apuroreel"}
    ]
};

let player;
let episodes = [];
let isMuted = true;

function updateTime() {
    const now = new Date();
    const options = { timeZone: CONFIG.timezone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    document.getElementById('clock-v1').textContent = new Intl.DateTimeFormat('es-ES', options).format(now);
    document.getElementById('date-v1').textContent = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
}
setInterval(updateTime, 1000);

const socialContainer = document.getElementById('socials-v1');
CONFIG.socials.forEach(s => {
    socialContainer.innerHTML += `<a href="${s.url}" target="_blank" class="social-link"><span>#</span>${s.label}</a>`;
});

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player-v1', {
        height: '100%', width: '100%',
        playerVars: { listType: 'playlist', list: CONFIG.playlistId, autoplay: 1, controls: 0, mute: 1, modestbranding: 1, rel: 0 },
        events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
    });
}

async function onPlayerReady(event) {
    const playlist = player.getPlaylist();
    const loadingElement = document.getElementById('loading-v1');

    async function getYouTubeTitle(videoId, index) {
        try {
            const response = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
            if (response.ok) {
                const data = await response.json();
                return data.title;
            }
        } catch (e) {}
        return `Episodio #${index + 1}`;
    }

    episodes = await Promise.all(playlist.map(async (id, index) => {
        const title = await getYouTubeTitle(id, index);
        return { id, title };
    }));

    loadingElement.style.display = 'none';
    syncToLive();
    setInterval(updateProgressBar, 1000);
}

function syncToLive() {
    if(!episodes.length) return;
    const now = new Date();
    const hour = now.getHours();
    const index = hour % episodes.length;
    
    player.playVideoAt(index);
    const secondsPassed = (now.getMinutes() * 60) + now.getSeconds();
    player.seekTo(secondsPassed, true);
    
    updateHeader(index);
    renderGuide();
}

function updateHeader(index) {
    if(episodes[index]) {
        document.getElementById('title-v1').textContent = `ESTÃS VIENDO: ${episodes[index].title}`;
    }
}

function renderGuide() {
    const guide = document.getElementById('guide-v1');
    const currentHour = new Date().getHours();
    guide.innerHTML = '';
    for(let i = 0; i < 24; i++) {
        const epIdx = i % episodes.length;
        const isLive = i === currentHour;
        guide.innerHTML += `
            <button class="guide-item ${isLive ? 'live' : ''}" onclick="previewEp(${epIdx})">
                <small>${i < 10 ? '0'+i : i}:00 HS ${isLive ? 'â€¢ AL AIRE' : ''}</small>
                <strong>${episodes[epIdx] ? episodes[epIdx].title : 'Cargando...'}</strong>
            </button>`;
    }
}

function previewEp(index) {
    player.playVideoAt(index);
    updateHeader(index);
}

function updateProgressBar() {
    const now = new Date();
    const secondsIn = (now.getMinutes() * 60) + now.getSeconds();
    document.getElementById('bar-v1').style.width = `${(secondsIn / 3600) * 100}%`;
    const rem = 3600 - secondsIn;
    document.getElementById('countdown-v1').textContent = `PRÃ“XIMO BLOQUE EN: ${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
    if(rem <= 1) syncToLive();
}

function onPlayerStateChange(event) {
    if (event.data == YT.PlayerState.ENDED) syncToLive();
}

document.getElementById('mute-v1').addEventListener('click', function() {
    if (isMuted) { player.unMute(); this.textContent = "SILENCIAR"; }
    else { player.mute(); this.textContent = "QUITAR SILENCIO"; }
    isMuted = !isMuted;
});

document.getElementById('go-live-v1').addEventListener('click', syncToLive);
</script>
</body>
</html>
