<script>
// ... (Configuración y variables globales igual) ...

async function onPlayerReady(event) {
    const playlist = player.getPlaylist();
    const loadingElement = document.getElementById('loading-v1');
    
    // 1. Mostramos progreso de carga de títulos
    loadingElement.innerHTML = "<h2>CARGANDO TÍTULOS...</h2>";

    // 2. Función para obtener el título real de cada video vía oEmbed
    async function getYouTubeTitle(videoId) {
        try {
            // Usamos un proxy de oEmbed para obtener el JSON del video
            const response = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
            if (response.ok) {
                const data = await response.json();
                return data.title;
            }
        } catch (e) {
            console.error("Error obteniendo título:", e);
        }
        return "Video de la Playlist"; // Fallback si falla la red
    }

    // 3. Mapeamos los IDs de la playlist a sus títulos reales
    episodes = await Promise.all(playlist.map(async (id, index) => {
        const realTitle = await getYouTubeTitle(id);
        return {
            id: id,
            title: realTitle
        };
    }));

    // 4. Inicializamos el resto de la interfaz
    loadingElement.style.display = 'none';
    syncToLive();
    renderGuide(); // Ahora la guía usará los títulos reales
    
    // Ticker con títulos reales
    const ticker = document.getElementById('ticker-v1');
    const content = episodes.map(e => ` • AHORA: ${e.title}`).join(' ');
    ticker.innerHTML = `<span>${content} ${content}</span>`;
    
    setInterval(updateProgressBar, 1000);
}

// ... (El resto de funciones como renderGuide y syncToLive se mantienen igual) ...
</script>
