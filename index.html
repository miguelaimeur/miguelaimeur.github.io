<style>
  :root {
    --black:   #080505;
    --black2:  #100808;
    --crimson: #e8003d;
    --gold:    #c9a84c;
    --gold2:   #e8c96a;
    --white:   #ffffff;
    --muted:   rgba(255, 255, 255, 0.85); /* Aún más opaco para mayor claridad */
  }

  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 22px; /* Tamaño base de lectura muy alto */
    overflow-x: hidden;
    cursor: none;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
  }

  /* HERO - Escala aumentada */
  .hero-name {
    font-family:'Bebas Neue',sans-serif;
    font-size: clamp(5.5rem, 18vw, 15rem); /* Título principal masivo */
    line-height:.88; letter-spacing:.06em;
  }

  .hero-roles {
    gap: 2.5rem; margin-top: 3rem;
  }
  .hero-roles span { 
    font-size: 1.4rem; /* Roles mucho más visibles */
    letter-spacing: .5em; 
    color: var(--white); 
  }

  /* NAVEGACIÓN Y BOTONES */
  .soc-link, .section-link {
    padding: 1rem 2rem; /* Botones más grandes */
    font-size: 1.3rem;   /* Texto de botones aumentado */
    letter-spacing: .2em;
  }

  .btn-contact {
    padding: 1.5rem 3.5rem;
    font-size: 1.4rem;
    letter-spacing: .3em;
  }

  /* SECCIONES */
  section { padding: 10rem 2rem; } /* Más aire entre secciones */
  
  .section-eyebrow { 
    font-size: 1.1rem; 
    margin-bottom: 1.5rem; 
  }
  
  .section-title { 
    font-size: clamp(3.5rem, 8vw, 7.5rem); /* Títulos de sección más grandes */
    line-height: 1;
  }

  /* TEXTO INFORMATIVO */
  .player-info p, .about-text p, .contact-sub {
    font-size: 1.5rem; /* Párrafos grandes y claros */
    line-height: 1.7;
    margin-bottom: 2.5rem;
    color: var(--white);
  }

  .about-text strong { color: var(--gold2); font-size: 1.6rem; }

  /* ESTADÍSTICAS */
  .stat-n { font-size: 4.5rem; } /* Números de impacto */
  .stat-l { font-size: 1rem; letter-spacing: .3em; }

  /* PROYECTOS */
  .proj-card { padding: 3.5rem 2.5rem; }
  .proj-title { font-size: 2.2rem; }
  .proj-desc { font-size: 1.2rem; color: var(--white); }
  .proj-arrow { font-size: 1rem; }

  /* TAGS DE ESCENARIOS */
  .fest-tag {
    padding: 0.8rem 1.8rem;
    font-size: 0.9rem;
  }

  @media(max-width:768px){
    body { font-size: 20px; }
    .hero-name { font-size: clamp(4rem, 25vw, 9rem); }
    .section-title { font-size: 3.5rem; }
    section { padding: 6rem 1.5rem; }
  }
</style>
